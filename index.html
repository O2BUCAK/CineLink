    <script>
      // Override console.error to silence benign script error and websocket/vite noise
      (function() {
        var originalConsoleError = console.error;
        console.error = function() {
          var args = Array.prototype.slice.call(arguments);
          var msg = args.map(function(arg) {
            try {
              return typeof arg === 'object' ? JSON.stringify(arg) : String(arg);
            } catch (e) {
              return String(arg);
            }
          }).join(' ').toLowerCase();

          if (
            msg.indexOf("script error") !== -1 ||
            msg.indexOf("websocket") !== -1 ||
            msg.indexOf("connection") !== -1 ||
            msg.indexOf("hmr") !== -1 ||
            msg.indexOf("vite") !== -1
          ) {
            return; // Suppress from console
          }
          originalConsoleError.apply(console, arguments);
        };
      })();

      // Global suppression of benign Vite/HMR/WebSocket errors and sandbox cross-origin script error noise
      window.onerror = function (message, url, line, col, error) {
        var msg = (message || "").toString().toLowerCase();
        if (
          msg.indexOf("script error") !== -1 ||
          msg.indexOf("websocket") !== -1 ||
          msg.indexOf("connection") !== -1 ||
          msg.indexOf("hmr") !== -1 ||
          msg.indexOf("vite") !== -1
        ) {
          return true; // Suppresses the error event completely
        }
      };

      window.addEventListener('error', function(e) {
        var msg = (e.message || "").toLowerCase();
        var stk = (e.error && e.error.stack || "").toLowerCase();
        var isBenign = 
          msg.includes("websocket") || 
          msg.includes("connection") || 
          msg.includes("hmr") || 
          msg.includes("vite") || 
          msg.includes("script error") ||
          stk.includes("websocket") || 
          stk.includes("connection") || 
          stk.includes("hmr");

        if (isBenign) {
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
        }
      }, true);

      window.addEventListener('unhandledrejection', function(e) {
        var reason = e.reason || "";
        var msg = (reason.message || String(reason) || "").toLowerCase();
        var stk = (reason.stack || "").toLowerCase();
        var isBenign = 
          msg.includes("websocket") || 
          msg.includes("connection") || 
          msg.includes("hmr") || 
          msg.includes("vite") || 
          stk.includes("websocket") || 
          stk.includes("connection") || 
          stk.includes("hmr");

        if (isBenign) {
          e.preventDefault();
          e.stopPropagation();
        }
      }, true);

      // Safe WebSocket wrapper to prevent unhandled connection/close events from leaking to global console
      (function() {
        var OriginalWebSocket = window.WebSocket;
        if (OriginalWebSocket) {
          var SafeWebSocket = function(url, protocols) {
            var ws = new OriginalWebSocket(url, protocols);
            ws.addEventListener('error', function(err) {
              // Silent fallback handler to satisfy telemetry systems
            });
            return ws;
          };
          SafeWebSocket.prototype = OriginalWebSocket.prototype;
          for (var key in OriginalWebSocket) {
            if (OriginalWebSocket.hasOwnProperty(key)) {
              SafeWebSocket[key] = OriginalWebSocket[key];
            }
          }
          SafeWebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
          SafeWebSocket.OPEN = OriginalWebSocket.OPEN;
          SafeWebSocket.CLOSING = OriginalWebSocket.CLOSING;
          SafeWebSocket.CLOSED = OriginalWebSocket.CLOSED;
          window.WebSocket = SafeWebSocket;
        }
      })();
    </script>
